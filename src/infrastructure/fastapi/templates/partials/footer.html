<footer class="c-home-footer" role="contentinfo">
    <div class="tw:container tw:mx-auto tw:px-4">
        <div class="c-home-footer__shell">
            <div>
                <p class="c-home-footer__brand">{{ brand.brandName }}</p>
                <p class="c-home-footer__note">&copy; {{ year }} {{ brand.brandName }} | {{ brand.baseOperativa }}</p>
            </div>
            <p class="c-home-footer__legal">{{ content.legal.text }}</p>
            <a class="c-home-footer__whatsapp" href="{{ brand.whatsappUrl }}" target="_blank" rel="noopener noreferrer">Escribime</a>
        </div>
    </div>
</footer>
