{% macro service_card(icon_class, title, description, subtitle, items, note, cta_text) %}
<article data-v-236fef00="" class="c-home-service-card">
    <div data-v-236fef00="" class="c-home-service-card__summary">
        <span data-v-236fef00="" class="c-home-service-card__icon" aria-hidden="true"><i data-v-236fef00="" class="{{ icon_class }}"></i></span>
        <span data-v-236fef00="" class="c-home-service-card__summary-copy">
            <span data-v-236fef00="" class="c-home-service-card__title">{{ title }}</span>
            <span data-v-236fef00="" class="c-home-service-card__description">{{ description }}</span>
        </span>
    </div>
    <div data-v-236fef00="" class="c-home-service-card__content">
        <p data-v-236fef00="" class="c-home-service-card__subtitle">{{ subtitle }}</p>
        <ul data-v-236fef00="" class="c-home-service-card__list">
            {% for item in items %}
            <li data-v-236fef00="">
                <span data-v-236fef00="" class="c-home-service-card__bullet" aria-hidden="true"><i data-v-236fef00="" class="bi bi-check2-circle"></i></span>
                <span data-v-236fef00="">{{ item }}</span>
            </li>
            {% endfor %}
        </ul>
        <p data-v-236fef00="" class="c-home-service-card__note">{{ note }}</p>
        <button data-v-236fef00="" type="button" class="tw:btn-outline c-home-service-card__cta">{{ cta_text }}</button>
    </div>
</article>
{% endmacro %}
