<section id="faq" class="c-home-faq">
    <div class="c-home-section-head">
        <span class="c-home-eyebrow">Ayuda</span>
        <h2 class="c-home-section-title">Preguntas frecuentes</h2>
    </div>
    <div class="c-home-faq__stack">
        {% for item in content.faq.questions %}
        <details class="c-home-faq__item" {% if loop.first %}open{% endif %}>
            <summary class="c-home-faq__summary">
                <span>{{ item.question }}</span>
                <span class="c-home-faq__toggle" aria-hidden="true">
                    <i class="bi bi-plus-lg"></i>
                </span>
            </summary>
            <p class="c-home-faq__answer">{{ item.answer }}</p>
        </details>
        {% endfor %}
    </div>
</section>
