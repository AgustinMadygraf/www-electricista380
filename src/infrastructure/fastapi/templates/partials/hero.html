<section class="c-home-hero c-home-hero--direct" aria-labelledby="hero-title" style="background-image: linear-gradient(180deg, rgba(var(--dm-surface-0-rgb), 0.42), rgba(var(--dm-bg-0-rgb), 0.96)), url('/static/media/hero-energy.svg');">
    <div class="c-home-hero__inner">
        <div class="c-home-hero__copy">
            <span class="c-home-eyebrow">{{ content.hero.badge }}</span>
            <h1 id="hero-title" class="c-home-hero__title">{{ content.hero.title }}</h1>
            <p class="c-home-hero__subtitle">{{ content.hero.subtitle }}</p>
            <div class="c-home-hero__actions">
                <a href="{{ content.hero.primaryCta.href }}" class="cta-button primary">{{ content.hero.primaryCta.label }}</a>
            </div>
            
            <p class="c-home-hero__urgency" role="status">
                <i class="bi bi-lightning-charge-fill" aria-hidden="true"></i>
                <span>{{ content.hero.responseNote }}</span>
            </p>
            
            <p class="c-home-hero__prefill">WhatsApp abre con mensaje precargado para agilizar la asistencia.</p>
        </div>
        
        <article class="c-home-hero__media-card">
            <p class="c-home-hero__media-label">Cobertura técnica activa</p>
            <img src="/static/media/hero-energy.svg" alt="{{ content.hero.image.alt }}" class="c-home-hero__image" width="900" height="700" fetchpriority="high" loading="eager" decoding="async">
        </article>
    </div>
</section>
