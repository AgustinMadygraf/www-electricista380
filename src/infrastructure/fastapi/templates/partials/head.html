{% macro head_seo(request, seo_data) %}
<head>
    <meta charset='UTF-8'>
    <link rel='icon' href='{{ request.url_for('static', path='favicon.ico') }}'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>{{ seo_data.title | default('DataMaq', true) }}</title>
    
    <link rel='stylesheet' crossorigin='' href='{{ request.url_for('static', path='css/index.css') }}'>
    
    <script>
        window.APP_CONFIG = {
            gaId: '{{ config.GOOGLE_ANALYTICS_ID }}',
            clarityId: '{{ config.CLARITY_ID }}'
        };
    </script>
    
    <link rel='stylesheet' crossorigin='' href='{{ request.url_for('static', path='js/app.js') }}'>
    <link rel='stylesheet' crossorigin='' href='{{ request.url_for('static', path='css/WhatsAppFab.css') }}'>
    <link rel='stylesheet' crossorigin='' href='{{ request.url_for('static', path='css/useContactPageActions.css') }}'>
    <link rel='stylesheet' crossorigin='' href='{{ request.url_for('static', path='css/HomePage.css') }}'>

    <meta name='description' content='{{ seo_data.description | default('', true) }}'>
    <meta name='robots' content='index,follow'>
    
    <meta property='og:title' content='{{ seo_data.title | default('DataMaq', true) }}'>
    <meta property='og:description' content='{{ seo_data.description | default('', true) }}'>
    <meta property='og:type' content='website'>
    <meta property='og:url' content='{{ seo_data.canonical_url | default('https://datamaq.com.ar', true) }}'>
    <meta property='og:image' content='{{ seo_data.og_image | default('https://datamaq.com.ar/og-default.png', true) }}'>
    <meta property='og:site_name' content='{{ seo_data.site_name | default('DataMaq', true) }}'>
    <meta property='og:locale' content='es_AR'>
    
    <meta name='twitter:card' content='summary_large_image'>
    <meta name='twitter:title' content='{{ seo_data.title | default('DataMaq', true) }}'>
    <meta name='twitter:description' content='{{ seo_data.description | default('', true) }}'>
    <meta name='twitter:image' content='{{ seo_data.og_image | default('https://datamaq.com.ar/og-default.png', true) }}'>
    
    <link rel='canonical' href='{{ seo_data.canonical_url | default('https://datamaq.com.ar', true) }}'>
    <link rel='alternate' hreflang='es_AR' href='{{ seo_data.canonical_url | default('https://datamaq.com.ar', true) }}'>

    <script type='application/ld+json' children='{
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "{{ seo_data.site_name | default('DataMaq', true) }}",
        "url": "{{ seo_data.canonical_url | default('https://datamaq.com.ar', true) }}"
    }''></script>
</head>
{% endmacro %}
